<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CueMemo Web</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #eeeeea;
      --ink: #202020;
      --soft: #666666;
      --line: rgba(32, 32, 32, 0.14);
      --line-strong: rgba(32, 32, 32, 0.28);
      --panel: rgba(250, 250, 247, 0.76);
      --radius: 10px;
      --font: "Hiragino Sans", "Yu Gothic", "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: var(--font);
      color: var(--ink);
      background:
        linear-gradient(rgba(255,255,255,0.18), rgba(255,255,255,0.18)),
        repeating-linear-gradient(0deg, rgba(32,32,32,0.015) 0, rgba(32,32,32,0.015) 1px, transparent 1px, transparent 28px),
        var(--paper);
    }

    button, input, textarea { font: inherit; }
    button {
      border: 1px solid var(--line-strong);
      border-radius: 999px;
      background: rgba(248, 248, 245, 0.74);
      color: var(--ink);
      cursor: pointer;
      min-height: 40px;
      padding: 0 14px;
    }
    button:hover { background: rgba(243,243,240,0.96); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(248, 248, 245, 0.92);
      color: var(--ink);
      outline: none;
      padding: 10px 12px;
    }

    .hidden { display: none !important; }
    .app {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 34px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 4px 2px 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: clamp(1.8rem, 3.6vw, 2.6rem); }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(248,248,245,0.62);
      color: var(--soft);
      font-size: 0.84rem;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 14px;
      min-height: calc(100vh - 160px);
    }
    .player-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 14px;
    }
    .stack { display: grid; gap: 14px; align-content: start; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      display: grid;
      gap: 12px;
    }
    .title { margin: 0; font-size: 0.94rem; font-weight: 600; }
    .muted { margin: 0; color: var(--soft); font-size: 0.9rem; line-height: 1.6; }

    .button-row, .recording-actions, .meta-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .selection-status {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(248,248,245,0.84);
      color: var(--soft);
      font-size: 0.9rem;
    }

    .drop-zone {
      min-height: 160px;
      padding: 20px;
      border-radius: 8px;
      border: 1px dashed var(--line-strong);
      background:
        repeating-linear-gradient(90deg, rgba(32,32,32,0.02) 0, rgba(32,32,32,0.02) 1px, transparent 1px, transparent 22px),
        rgba(248,248,245,0.66);
      display: grid;
      place-items: center;
      text-align: center;
    }
    .drop-zone.dragover {
      border-color: rgba(32,32,32,0.36);
      background: rgba(248,248,245,0.94);
    }
    .drop-zone-content { display: grid; gap: 6px; justify-items: center; }
    .drop-zone-icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      background: rgba(248,248,245,0.86);
    }

    .prompt {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(248,248,245,0.86);
    }
    .prompt-row, .memo-input-row, .playback-controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
      max-height: 340px;
      overflow-y: auto;
    }
    .file-item, .memo-item {
      display: grid;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(248,248,245,0.74);
    }
    .file-item {
      grid-template-columns: 1fr auto;
      cursor: pointer;
    }
    .memo-item {
      grid-template-columns: auto auto minmax(0,1fr) auto auto;
    }
    .file-item-name, .memo-text { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-item-count, .memo-time { color: var(--soft); font-size: 0.82rem; }
    .memo-color-badge {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(32,32,32,0.18);
    }
    .memo-item button {
      min-height: 34px;
      padding: 0 10px;
      background: transparent;
      font-size: 0.82rem;
    }

    .waveform-container {
      position: relative;
      min-height: 180px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background:
        repeating-linear-gradient(0deg, rgba(32,32,32,0.015) 0, rgba(32,32,32,0.015) 1px, transparent 1px, transparent 26px),
        rgba(248,248,245,0.76);
      overflow: hidden;
    }
    #waveform { width: 100%; height: 180px; display: block; }
    .waveform-hint {
      position: absolute;
      right: 14px;
      bottom: 14px;
      color: var(--soft);
      font-size: 0.8rem;
      pointer-events: none;
    }
    .waveform-memo-tooltip {
      position: absolute;
      top: 12px;
      left: 12px;
      max-width: min(360px, calc(100% - 24px));
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(248,248,245,0.96);
      font-size: 0.86rem;
      pointer-events: none;
    }

    .meta-pill {
      min-width: 90px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(248,248,245,0.84);
      text-align: center;
      color: var(--soft);
      font-size: 0.82rem;
    }
    .meta-pill strong { display: block; margin-top: 4px; color: var(--ink); }

    .playback-controls {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(248,248,245,0.58);
    }
    .volume-control {
      display: grid;
      grid-template-columns: auto minmax(140px,1fr) auto;
      gap: 10px;
      align-items: center;
      color: var(--soft);
      font-size: 0.9rem;
    }
    .volume-control input[type="range"] { accent-color: #444; }

    .memo-edit-row {
      display: grid;
      gap: 10px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(248,248,245,0.88);
    }
    .memo-edit-color { display: flex; gap: 10px; flex-wrap: wrap; }
    .memo-edit-color button {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      border: 2px solid transparent;
      min-height: 38px;
      padding: 0;
    }
    .memo-edit-color button.active { border-color: var(--ink); }
    .memo-edit-color button.red { background: #4c4c4c; }
    .memo-edit-color button.blue { background: #747474; }
    .memo-edit-color button.green { background: #9a9a9a; }
    .memo-edit-color button.yellow { background: #c6c6c6; }
    .memo-edit-actions { display: flex; justify-content: flex-end; gap: 10px; flex-wrap: wrap; }

    .popup {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 40;
      pointer-events: none;
    }
    .popup.visible { pointer-events: auto; }
    .popup-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.12);
      backdrop-filter: blur(2px);
    }
    .popup-panel {
      position: relative;
      z-index: 1;
      width: min(460px, calc(100% - 20px));
      padding: 18px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      display: grid;
      gap: 12px;
    }
    .popup-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .popup-item { display: grid; gap: 6px; }
    .popup-item strong { color: var(--soft); font-size: 0.8rem; }
    .popup-item span {
      display: block;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: rgba(248,248,245,0.86);
      word-break: break-all;
    }

    @media (max-width: 980px) {
      .layout, .player-layout { grid-template-columns: 1fr; }
      .list { max-height: none; }
    }
    @media (max-width: 680px) {
      .app { width: min(100%, calc(100% - 16px)); padding-top: 18px; }
      .prompt-row, .memo-input-row, .playback-controls, .volume-control { grid-template-columns: 1fr; }
      .memo-item { grid-template-columns: auto auto 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>CueMemo</h1>
      <div class="status">いま開いているもの: <strong id="appStatusLabel">Ready</strong></div>
    </header>

    <div id="screen-upload" class="layout">
      <section class="panel">
        <h2 class="title">新規プロジェクト</h2>
        <div class="button-row">
          <button id="selectFile" type="button">音声ファイルを選ぶ</button>
          <button id="projectImportBtn" type="button">読み込む</button>
          <button id="recordProjectBtn" type="button">録音して作る</button>
          <span id="selectedFileName" class="selection-status">未選択</span>
        </div>
        <div id="drop" class="drop-zone">
          <div class="drop-zone-content">
            <div class="drop-zone-icon">♪</div>
            <strong>ここに音声を置く</strong>
          </div>
        </div>
        <input type="file" id="fileInput" accept="audio/*" hidden>
        <input type="file" id="projectImportInput" accept=".cuememo,application/json" hidden>
        <div id="projectNamePrompt" class="prompt hidden">
          <h3 class="title">プロジェクト名</h3>
          <div class="prompt-row">
            <input id="projectNameInput" type="text" placeholder="名前を入力">
            <button id="confirmProjectBtn" type="button">作成</button>
          </div>
        </div>
      </section>

      <div class="stack">
        <section class="panel">
          <h3 class="title">プロジェクト一覧</h3>
          <ul id="fileList" class="list"></ul>
          <p id="noFilesMessage" class="muted">まだプロジェクトはありません。</p>
        </section>
        <section class="panel">
          <h3 class="title">録音</h3>
          <div class="recording-actions">
            <button id="startRecordingBtn" type="button">録音開始</button>
            <button id="stopRecordingBtn" type="button" disabled>録音停止</button>
          </div>
          <div id="recordingStatus" class="muted">ブラウザ内に保存します。</div>
        </section>
      </div>
    </div>

    <div id="screen-player" class="player-layout hidden">
      <div class="stack">
        <section class="panel">
          <div class="button-row" style="justify-content: space-between;">
            <h2 id="currentFileNameDisplay" class="title" style="font-size:1.1rem;margin:0;">Untitled</h2>
            <div class="button-row">
              <button id="backBtn" type="button">戻る</button>
              <button id="infoBtn" type="button">情報</button>
            </div>
          </div>
          <div class="button-row" style="justify-content: space-between; align-items: start;">
            <h3 class="title" style="margin-top: 4px;">波形</h3>
            <div class="meta-row">
              <div class="meta-pill">Time<strong id="time">00:00</strong></div>
              <div class="meta-pill">Memos<strong id="memoCount">0</strong></div>
            </div>
          </div>
          <div id="waveformContainer" class="waveform-container">
            <canvas id="waveform"></canvas>
            <div class="waveform-hint">クリックで移動</div>
            <div id="waveformMemoTooltip" class="waveform-memo-tooltip hidden"></div>
          </div>
          <audio id="player" class="hidden"></audio>
          <div class="playback-controls">
            <div class="recording-actions">
              <button id="projectExportBtn" type="button">書き出す</button>
              <button id="replaceAudioBtn" type="button">録音で差し替え</button>
            </div>
          </div>
          <div class="memo-input-row">
            <input id="memoInput" type="text" placeholder="今の場所にメモを書く">
            <button id="addMemo" type="button">追加</button>
          </div>
        </section>
      </div>

      <div class="stack">
        <section class="panel">
          <h3 class="title">時刻メモ</h3>
          <ul id="memoList" class="list"></ul>
        </section>
        <section class="panel">
          <h3 class="title">ノート</h3>
          <div class="memo-input-row">
            <input id="noteInput" type="text" placeholder="自由メモを書く">
            <button id="addNote" type="button">追加</button>
          </div>
          <ul id="noteList" class="list"></ul>
        </section>
      </div>
    </div>

    <div id="infoPopup" class="popup hidden" aria-hidden="true">
      <div class="popup-backdrop" data-close-popup></div>
      <div class="popup-panel">
        <div class="popup-head">
          <h3 id="infoPopupTitle" class="title" style="margin:0;">プロジェクト情報</h3>
          <button id="closeInfoBtn" type="button" aria-label="閉じる">×</button>
        </div>
        <div class="popup-item">
          <strong>保存先</strong>
          <span id="infoFilePath">ブラウザ内保存</span>
        </div>
        <div class="popup-item">
          <strong>作成日時</strong>
          <span id="infoCreatedAt">-</span>
        </div>
        <button id="projectImportInfoBtn" type="button">プロジェクトを読む</button>
        <button id="projectExportInfoBtn" type="button">プロジェクトを書き出す</button>
        <button id="exportMemosBtn" type="button">メモを書き出す</button>
      </div>
    </div>
  </div>

  <script src="web.js"></script>
</body>
</html>
